name: Build Docker Image

on:
  push:
    branches:
      - feat/knockout
      - "hotfix/*"
    paths:
      - "app.py"
  pull_request:
    branches:
      - feat/knockout

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: iceshoesss/league-web

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract WEB_VERSION from app.py
        id: version
        run: |
          VERSION=$(grep -oP 'WEB_VERSION\s*=\s*"\K[^"]+' app.py)
          if [ -z "$VERSION" ]; then
            echo "::error::WEB_VERSION not found in app.py"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected WEB_VERSION: $VERSION"

      - name: Determine image tags
        id: tags
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          VERSION="${{ steps.version.outputs.version }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # PR: 只构建不推送，tag 仅用于本地验证
            echo "tags=${IMAGE}:knockout-${VERSION}" >> "$GITHUB_OUTPUT"
            echo "push=false" >> "$GITHUB_OUTPUT"
          elif [[ "$BRANCH" == "feat/knockout" ]]; then
            # feat/knockout: knockout-{version} + latest
            echo "tags=${IMAGE}:knockout-${VERSION},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            # hotfix/*: knockout-{version} only
            echo "tags=${IMAGE}:knockout-${VERSION}" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        if: steps.tags.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.tags.outputs.push }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
