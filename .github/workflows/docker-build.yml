name: Build Docker Image

on:
  push:
    branches:
      - feat/knockout
      - "hotfix/*"
    paths:
      - "app.py"
      - ".github/workflows/docker-build.yml"
  pull_request:
    branches:
      - feat/knockout
  schedule:
    - cron: "0 2 * * *"  # 每天 UTC 02:00（北京时间 10:00）

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: iceshoesss/league-web

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: feat/knockout  # schedule 事件固定 checkout feat/knockout

      - name: Extract WEB_VERSION from app.py
        id: version
        run: |
          VERSION=$(grep -oP 'WEB_VERSION\s*=\s*"\K[^"]+' app.py)
          if [ -z "$VERSION" ]; then
            echo "::error::WEB_VERSION not found in app.py"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected WEB_VERSION: $VERSION"

      - name: Check if WEB_VERSION changed
        id: changed
        if: github.event_name == 'push'
        run: |
          # 获取上一个 commit 的 WEB_VERSION
          PREV_VERSION=$(git show HEAD~1:app.py | grep -oP 'WEB_VERSION\s*=\s*"\K[^"]+' || echo "")
          CURR_VERSION="${{ steps.version.outputs.version }}"
          echo "Previous: $PREV_VERSION, Current: $CURR_VERSION"
          if [[ "$PREV_VERSION" == "$CURR_VERSION" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "WEB_VERSION unchanged, skipping build"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "WEB_VERSION changed: $PREV_VERSION → $CURR_VERSION"
          fi

      - name: Get date
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> "$GITHUB_OUTPUT"

      - name: Determine image tags
        id: tags
        if: steps.changed.outputs.skip != 'true' || github.event_name == 'schedule'
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          VERSION="${{ steps.version.outputs.version }}"
          DATE="${{ steps.date.outputs.date }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # PR: 只构建不推送
            echo "tags=${IMAGE}:knockout-${VERSION}" >> "$GITHUB_OUTPUT"
            echo "push=false" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            # 定时构建: nightly + nightly-YYYYMMDD
            echo "tags=${IMAGE}:nightly,${IMAGE}:nightly-${DATE}" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          elif [[ "$BRANCH" == "feat/knockout" ]]; then
            # feat/knockout: knockout-{version} + latest
            echo "tags=${IMAGE}:knockout-${VERSION},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            # hotfix/*: knockout-{version} only
            echo "tags=${IMAGE}:knockout-${VERSION}" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        if: steps.changed.outputs.skip != 'true' || github.event_name == 'schedule'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.changed.outputs.skip != 'true' || github.event_name == 'schedule'
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        if: (steps.changed.outputs.skip != 'true' || github.event_name == 'schedule') && steps.tags.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.changed.outputs.skip != 'true' || github.event_name == 'schedule'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.tags.outputs.push }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
