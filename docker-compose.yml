services:
  web:
    image: league-web:latest
    ports:
      - "5000:5000"
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=hearthstone
      - FLASK_SECRET_KEY=changeme-in-production
      - MIN_PLUGIN_VERSION=0.5.5
      - PLUGIN_API_KEY=bgtracker-20260414
      # 以下有默认值，按需取消注释
      # - SITE_NAME=酒馆战棋联赛
      # - SITE_LOGO=🍺
      # - CLEANUP_INTERVAL=60
      # QQ 机器人集成（部署 bot 后取消注释）
      # - WEBHOOK_URL=http://bg-qqbot:8080/webhook/league
      # - BOT_API_KEY=与bot的BOT_API_KEY一致
      # 赛事报名截止时间（ISO 格式，含时区）
      # - ENROLL_DEADLINE=2026-05-01T20:00:00+08:00
      # 赛事阶段：auto（自动判断）/ enroll（强制报名页）/ bracket（强制对阵图）
      # - TOURNAMENT_PHASE=auto
    depends_on:
      mongo:
        condition: service_started
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
