{% extends "base.html" %}

{% block title %}{{ site_name }}{% endblock %}

{% block head %}
<style>
  .bracket-scroll { overflow-x: auto; padding-bottom: 12px; }
  .bracket-area { position: relative; margin: 0 auto; }

  .svg-layer {
    position: absolute; top: 0; left: 0;
    pointer-events: none; z-index: 0;
  }
  .svg-layer path { stroke: rgba(42,42,74,0.6); stroke-width: 2; fill: none; }
  .svg-layer path.on { stroke: #e2b714; stroke-width: 2.5; filter: drop-shadow(0 0 3px rgba(226,183,20,0.15)); }

  /* ── 轮次标题 ── */
  .round-title {
    position: absolute;
    font-size: 12px; font-weight: 700; color: #8b8b9e;
    letter-spacing: 1.5px; text-transform: uppercase;
    background: #1a1a2e; border: 1px solid #2a2a4a;
    border-radius: 5px; padding: 4px 14px; white-space: nowrap;
    z-index: 2; transform: translateX(-50%);
  }
  .round-title.gold { color: #e2b714; border-color: rgba(226,183,20,0.4); }
  .round-title.collapsible { cursor: pointer; }
  .round-title.collapsible:hover { border-color: rgba(226,183,20,0.5); color: #e2b714; }
  .round-title.collapsible::after { content: ' ▾'; font-size: 10px; opacity: 0.6; }

  /* ── 折叠指示（.. 标签）── */

  /* ── 小组卡片 ── */
  .group-card {
    position: absolute; z-index: 1;
    background: #16213e;
    border: 1px solid rgba(226,183,20,0.3);
    border-radius: 0.75rem;
    overflow: hidden;
    transition: border-color 0.2s, opacity 0.3s;
  }
  .group-card:hover { border-color: rgba(226,183,20,0.6); }
  .group-card.active { border-color: rgba(52,211,153,0.5); box-shadow: 0 0 12px rgba(52,211,153,0.08); }
  .group-card.done  { border-color: rgba(42,42,74,0.5); }
  .group-card.final {
    border-color: rgba(226,183,20,0.5);
    background: linear-gradient(160deg, #1e1a0e, #16213e);
    box-shadow: 0 0 18px rgba(226,183,20,0.06);
  }

  .g-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 12px;
    background: rgba(0,0,0,0.15);
    border-bottom: 1px solid #2a2a4a;
    font-size: 12px; font-weight: 600;
  }
  .g-head .name { color: #e2b714; }
  .g-head .right { display: flex; align-items: center; gap: 6px; }
  .g-head .bo-info { font-size: 10px; color: #8b8b9e; font-weight: 500; }

  .badge { font-size: 10px; padding: 2px 7px; border-radius: 3px; font-weight: 700; }
  .badge.active  { background: rgba(52,211,153,0.14); color: #34d399; }
  .badge.done    { background: rgba(139,139,158,0.1); color: #8b8b9e; }
  .badge.waiting { background: rgba(226,183,20,0.1);  color: #c9a84c; }

  .p-row {
    display: flex; align-items: center;
    padding: 0 12px; height: 48px; font-size: 13.5px; color: #d1d5db;
    border-bottom: 1px solid rgba(42,42,74,0.4);
  }
  .p-row:last-child { border-bottom: none; }
  .p-row .pos { width: 20px; font-weight: 700; font-size: 11px; color: #8b8b9e; text-align: center; flex-shrink: 0; }
  .p-row .pos.g { color: #ffd700; }
  .p-row .pos.s { color: #c0c0c0; }
  .p-row .pos.b { color: #cd7f32; }
  .p-row .nm { flex: 1; margin-left: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .p-row .nm.empty { color: #8b8b9e; font-style: italic; }
  .p-row .nm .nm-link { color: inherit; text-decoration: none; transition: color .15s; }
  .p-row .nm .nm-link:hover { color: #e2b714; }
  .p-row .pts { font-size: 11px; font-weight: 700; color: #e2b714; margin-left: 4px; flex-shrink: 0; }
  .p-row.q .pos { color: #34d399; }
  .p-row.q .nm  { color: #34d399; }
  .p-row.el .nm { color: #8b8b9e; }
  .p-row.el img { filter: grayscale(1); opacity: 0.4; }
  .group-card.done .p-row.el .nm { color: #d1d5db; }
  .group-card.done .p-row.el img { filter: none; opacity: 1; }
  /* 对战图不限制宽度，靠浏览器原生滚动条 */
  main { max-width: none !important; }

  /* ── Grid 平铺布局（海选赛）── */
  .grid-layout {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 12px;
    justify-content: center;
    max-width: 1500px;
    margin: 0 auto;
  }
  .grid-layout .group-card {
    position: static !important;
    width: 100% !important;
  }
  .grid-layout .round-title-grid {
    grid-column: 1 / -1;
    font-size: 14px; font-weight: 700; color: #e2b714;
    letter-spacing: 1.5px; text-transform: uppercase;
    padding: 8px 0 4px 0;
    border-bottom: 1px solid #2a2a4a;
    margin-bottom: 4px;
  }
</style>
{% endblock %}

{% block content %}
<div class="relative mb-4">
  <div class="flex justify-center gap-5 text-xs text-hearth-dim">
    <span class="flex items-center gap-1.5"><i class="w-2 h-2 rounded-full inline-block" style="background:#34d399"></i> 进行中</span>
    <span class="flex items-center gap-1.5"><i class="w-2 h-2 rounded-full inline-block" style="background:#4e505a"></i> 已结束</span>
    <span class="flex items-center gap-1.5"><i class="w-2 h-2 rounded-full inline-block" style="background:#9a7420"></i> 等待中</span>
  </div>
  <select id="bracket-switcher" onchange="switchBracketView(this.value)"
    class="absolute right-0 top-0 text-xs text-hearth-dim bg-hearth-card border border-hearth-border rounded px-2 py-1 hover:border-hearth-gold/40 transition cursor-pointer focus:outline-none focus:border-hearth-gold/60">
    <option value="active">当前赛事</option>
  </select>
</div>
<div id="brackets-container"></div>
<div id="empty-state" class="text-center py-20 text-hearth-dim" style="display:none">
  <div class="text-4xl mb-4">📭</div>
  <div class="text-lg font-medium mb-2">暂无历史赛事</div>
  <div class="text-sm">归档的赛事会显示在这里</div>
</div>
{% endblock %}

{% block scripts %}
<script>
const DATA = {{ data_json | safe }};

/* ── 常量 ── */
const HEADER_H = 38, ROW_H = 48, CARD_W = 280;
const CARD_H = HEADER_H + 8 * ROW_H;      // 422
const COL_GAP = 70, PAD_LEFT = 30, PAD_TOP = 50, PAD_BOT = 30;
const COLLAPSED_W = 24;                       // 折叠指示条宽度

/* ── 赛事状态 ── */
const tournaments = [];

/* ══════════════════════════════════════════
   布局计算（每次渲染重新算，支持折叠后重分布）
   ══════════════════════════════════════════ */
function layoutRound(rounds, flat, collapsed, areaH) {
  const nR = rounds.length;
  const r1Count = rounds[0].groups.length;
  const r1Gap = r1Count > 1 ? (areaH - PAD_TOP - PAD_BOT - r1Count * CARD_H) / (r1Count - 1) : 0;

  // 找出当前可见的轮次
  const vis = [];
  for (let ri = 0; ri < nR; ri++) { if (!collapsed.has(ri)) vis.push(ri); }

  // 每个可见轮的垂直位置
  const pos = [];   // pos[ri] = [cy0, cy1, ...]

  vis.forEach((ri, vi) => {
    const groups = rounds[ri].groups;
    if (vi === 0) {
      // 第一个可见轮：均匀分布
      pos[ri] = groups.map((_, i) => PAD_TOP + i * (CARD_H + r1Gap) + CARD_H / 2);
    } else {
      // 基于上一个可见轮，按 feedsInto 链追踪中点
      const prevRi = vis[vi - 1];
      pos[ri] = groups.map((_, gi) => {
        const srcs = traceSrc(flat, prevRi, ri, gi);
        if (srcs.length >= 2) {
          const ys = srcs.map(s => pos[prevRi][s.gi]).sort((a, b) => a - b);
          return (ys[0] + ys[ys.length - 1]) / 2;
        } else if (srcs.length === 1) {
          return pos[prevRi][srcs[0].gi];
        }
        return PAD_TOP + gi * (CARD_H + r1Gap) + CARD_H / 2;
      });
    }
  });

  return pos;
}

/* ── 反向追踪：dstRi 的 gi 组，来自 srcRi 的哪些组 ── */
function traceSrc(flat, srcRi, dstRi, gi) {
  if (dstRi === srcRi + 1) {
    // 直接相邻：找 srcRi 中 nextRoundGroupId == gi+1 的
    return flat[srcRi]
      .map((g, i) => ({ gi: i, nrg: g.nextRoundGroupId }))
      .filter(s => s.nrg === gi + 1);
  }
  // 跨轮：从 dstRi 反向推到 srcRi
  let cursors = [{ ri: dstRi, gi }];
  for (let ri = dstRi - 1; ri >= srcRi; ri--) {
    const prev = [];
    for (const c of cursors) {
      const sources = flat[ri]
        .map((g, i) => ({ gi: i, nrg: g.nextRoundGroupId }))
        .filter(s => s.nrg === c.ri + 1 && s.nrg === c.gi + 1);
      // 简化：直接找 feedsInto 到当前组的
      flat[ri].forEach((g, i) => {
        if (g.nextRoundGroupId === c.gi + 1 && !prev.some(p => p.gi === i)) {
          prev.push({ ri, gi: i });
        }
      });
    }
    cursors = prev.length ? prev : cursors;
  }
  return cursors.filter(c => c.ri === srcRi);
}

/* ══════════════════════════════════════════
   渲染（支持折叠）
   ══════════════════════════════════════════ */
function render(tIdx) {
  const t = tournaments[tIdx];
  const { rounds, flat, collapsed, areaEl, svgEl } = t;
  const nR = rounds.length;
  const areaH = parseInt(areaEl.style.height);

  // ── 重新计算垂直位置（折叠后重分布）──
  const pos = layoutRound(rounds, flat, collapsed, areaH);
  // 更新 flat 的 cy/top
  for (let ri = 0; ri < nR; ri++) {
    if (pos[ri]) {
      flat[ri].forEach((g, gi) => {
        g.cy = pos[ri][gi];
        g.top = pos[ri][gi] - CARD_H / 2;
      });
    }
  }

  // ── 计算列 x 坐标（折叠的轮次变窄）──
  const colXs = [];
  let x = PAD_LEFT;
  for (let ri = 0; ri < nR; ri++) {
    colXs[ri] = x;
    x += collapsed.has(ri) ? COLLAPSED_W + 8 : CARD_W + COL_GAP;
  }
  const areaW = x + 50;

  const vis = [];
  for (let ri = 0; ri < nR; ri++) { if (!collapsed.has(ri)) vis.push(ri); }

  // ── 设置区域尺寸 ──
  areaEl.style.width = areaW + 'px';
  svgEl.setAttribute('width', areaW);
  svgEl.setAttribute('height', areaH);
  svgEl.setAttribute('viewBox', `0 0 ${areaW} ${areaH}`);

  // ── 生成 HTML ── */
  let html = '';

  for (let ri = 0; ri < nR; ri++) {
    const round = rounds[ri];
    const cx = colXs[ri];
    const isLast = ri === nR - 1;
    const allDone = round.groups.every(g => g.status === 'done');
    const canCollapse = allDone && !isLast && ri < nR - 3;

    if (collapsed.has(ri)) {
      // ── 折叠指示（.. 标签）──
      html += `<div class="round-title" style="left:${cx + COLLAPSED_W / 2}px;top:12px;cursor:pointer" data-ri="${ri}" title="${round.label}（${round.groups.length} 组）— 点击展开">..</div>`;
    } else {
      // ── 轮次标题 ──
      html += `<div class="round-title${isLast ? ' gold' : ''}${canCollapse ? ' collapsible' : ''}" style="left:${cx + CARD_W / 2}px;top:12px"${canCollapse ? ` data-ri="${ri}"` : ''}>${round.label}</div>`;

      // ── 卡片 ──
      flat[ri].forEach(g => {
        const isFinal = ri === nR - 1;
        html += renderCard(g, cx, g.top, isFinal);
      });
    }
  }

  areaEl.innerHTML = '';
  areaEl.insertAdjacentHTML('beforeend', html);
  areaEl.prepend(svgEl);   // SVG 始终在最底层

  // ── SVG 连线（跨折叠轮次）──
  let paths = '';
  for (let vi = 0; vi < vis.length - 1; vi++) {
    const srcRi = vis[vi];
    const dstRi = vis[vi + 1];
    const srcX = colXs[srcRi] + CARD_W;
    const dstX = colXs[dstRi];

    // 遍历源轮每个组，追踪到目标轮
    flat[srcRi].forEach((src, si) => {
      const dests = traceDest(flat, srcRi, si, dstRi);
      if (!dests.length) return;

      const topDst = dests[0];
      const botDst = dests[dests.length - 1];
      const mx = (srcX + dstX) / 2;
      const on = src.status === 'done';

      // 上连线（到第一个目标）
      paths += `<path class="${on ? 'on' : ''}" d="M${srcX},${src.cy} H${mx} V${topDst.cy} H${dstX}"/>`;
      // 下连线（到最后一个目标，只有多个目标时）
      if (dests.length > 1) {
        paths += `<path class="${on ? 'on' : ''}" d="M${srcX},${src.cy} H${mx} V${botDst.cy} H${dstX}"/>`;
      }
    });
  }
  svgEl.innerHTML = paths;

  // ── 绑定折叠/展开事件 ──
  areaEl.querySelectorAll('[data-ri]').forEach(el => {
    el.onclick = () => toggleRound(tIdx, parseInt(el.dataset.ri));
  });
}

/* ── 追踪：源组在 srcRi 的 si 位置，最终到达 dstRi 的哪些组 ── */
function traceDest(flat, srcRi, si, dstRi) {
  let cursors = [{ ri: srcRi, gi: si }];
  for (let ri = srcRi + 1; ri <= dstRi; ri++) {
    const next = [];
    for (const c of cursors) {
      const nrg = flat[c.ri][c.gi].nextRoundGroupId;
      if (nrg != null) {
        // nextRoundGroupId 是 1-based
        const tIdx = nrg - 1;
        if (flat[ri][tIdx]) next.push({ ri, gi: tIdx });
      }
    }
    cursors = next.length ? next : cursors;  // 没找到就保持原位
  }
  return cursors.map(c => flat[c.ri][c.gi]);
}

/* ── 卡片 HTML ── */
function renderCard(g, x, y, isFinal) {
  const labels = { active: '进行中', done: '已结束', waiting: '等待中' };
  let h = `<div class="group-card ${g.status}${isFinal ? ' final' : ''}" style="left:${x}px;top:${y}px;width:${CARD_W}px">`;
  const boInfo = (g.boN && g.boN > 1) ? `<span class="bo-info">BO${g.boN} ${g.status === 'active' ? (g.gamesPlayed || 0) + 1 : (g.gamesPlayed || 0)}/${g.boN}</span>` : '';
  h += `<div class="g-head"><span class="name">${g.label}</span><div class="right">${boInfo}<span class="badge ${g.status}">${labels[g.status] || g.status}</span></div></div>`;
  const isWaiting = g.status === 'waiting';
  const showHero = g.status === 'active';

  // waiting/done 组已按累计积分排序（后端），不再重新排序
  // active 组只看当前小局：存活在前，已提交排名的按 currentPlacement 降序排最下方
  const sorted = g.status !== 'active'
    ? (g.players || []).slice()
    : (g.players || []).slice().sort((a, b) => {
    const aDead = a.dead === true;
    const bDead = b.dead === true;
    if (aDead !== bDead) return aDead ? 1 : -1;
    if (aDead) {
      const ap = a.currentPlacement || 999;
      const bp = b.currentPlacement || 999;
      return ap - bp;
    }
    return 0;
  });

  sorted.forEach((p, i) => {
    // dead/isDead: 进行中当前局的淘汰状态（灰化头像）
    // eliminated/qualified: 累积排名标记，只在 done 时生效
    const isDead = showHero && p.dead;
    const cls = g.status === 'done' && i < 4 ? 'q' : g.status === 'done' && p.eliminated ? 'el' : isDead ? 'el' : '';
    const pc = i === 0 ? 'g' : i === 1 ? 's' : i === 2 ? 'b' : '';
    const posText = p.empty ? '' : (i + 1);
    const img = (showHero && !p.empty && p.heroCardId)
      ? `<div class="w-[32px] h-[32px] rounded-full overflow-hidden flex-shrink-0 bg-black/30"><img src="https://art.hearthstonejson.com/v1/256x/${p.heroCardId}.jpg" alt="" class="w-[150%] h-[150%] object-cover${isDead ? ' grayscale opacity-50' : ''}" onerror="this.closest('div').style.display='none'"></div>`
      : '';
    h += `<div class="p-row ${cls}"><span class="pos ${pc}">${posText}</span>${img}`;
    const nmText = p.empty ? '待定' : (p.battleTag || p.displayName || p.name || '');
    const nmHtml = p.empty ? nmText : `<a href="/player/${encodeURIComponent(p.battleTag || '')}" class="nm-link" onclick="event.stopPropagation()">${nmText}</a>`;
    h += `<span class="nm${p.empty ? ' empty' : ''}"${img ? ' style="margin-left:5px"' : ''}>${nmHtml}</span>`;
    // 后端已算好累计积分（active 死亡玩家 = 之前+当前局），前端直接显示
    const pts = p.points;
    if (pts != null && pts > 0) h += `<span class="pts">${pts}</span>`;
    h += `</div>`;
  });
  return h + `</div>`;
}

/* ══════════════════════════════════════════
   折叠 / 展开
   ══════════════════════════════════════════ */
function toggleRound(tIdx, ri) {
  const t = tournaments[tIdx];
  const nR = t.rounds.length;
  // 最后 3 轮不支持折叠
  if (ri >= nR - 3) return;
  if (t.collapsed.has(ri)) {
    // 展开：右边所有轮次必须已展开（从右到左展开）
    for (let j = ri + 1; j < nR; j++) {
      if (t.collapsed.has(j)) return;
    }
    t.collapsed.delete(ri);
  } else {
    // 折叠：左边所有轮次必须已折叠（从左到右折叠）
    if (!t.rounds[ri].groups.every(g => g.status === 'done')) return;
    for (let j = 0; j < ri; j++) {
      if (!t.collapsed.has(j)) return;
    }
    t.collapsed.add(ri);
  }
  render(tIdx);
}

/* ══════════════════════════════════════════
   主入口
   ══════════════════════════════════════════ */

// 构建 flat 数据（不含位置，位置由 layoutRound 动态计算）
function buildFlat(rounds) {
  return rounds.map(r => r.groups.map(g => ({ ...g })));
}

const container = document.getElementById('brackets-container');

function initBrackets(data) {
  // 清空旧 DOM 和状态
  container.innerHTML = '';
  tournaments.length = 0;

  if (!data.tournaments || data.tournaments.length === 0) return;

  data.tournaments.forEach((t, tIdx) => {
    if (t.layout === 'grid') {
      // ── Grid 平铺模式（海选赛）──
      initGridTournament(t, tIdx);
    } else {
      // ── Bracket 对阵图模式（标准淘汰赛）──
      initBracketTournament(t, tIdx);
    }
  });
}

/* ── Grid 平铺模式 ── */
function initGridTournament(t, tIdx) {
  const wrap = document.createElement('div');
  t.rounds.forEach(round => {
    // 卡片网格
    const grid = document.createElement('div');
    grid.className = 'grid-layout';
    round.groups.forEach(g => {
      grid.insertAdjacentHTML('beforeend', renderCard(g, 0, 0, false));
    });
    wrap.appendChild(grid);
  });
  container.appendChild(wrap);
}

/* ── Bracket 对阵图模式（现有逻辑）── */
function initBracketTournament(t, tIdx) {
    const flat = buildFlat(t.rounds);
    const r1Count = t.rounds[0].groups.length;
    const minH = PAD_TOP + r1Count * CARD_H + Math.max(r1Count - 1, 0) * 20 + PAD_BOT;
    const areaH = Math.max(minH, 600);

    // 创建 DOM
    const scroll = document.createElement('div');
    scroll.className = 'bracket-scroll';
    const area = document.createElement('div');
    area.className = 'bracket-area';
    area.style.height = areaH + 'px';
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.classList.add('svg-layer');
    area.appendChild(svg);
    scroll.appendChild(area);
    container.appendChild(scroll);

    // 自动折叠已完成的轮次（从第 0 轮开始连续完成才折叠）
    // 最后 3 轮（四分之一决赛、半决赛、决赛）始终显示，不折叠
    const autoCollapsed = new Set();
    for (let ri = 0; ri < t.rounds.length - 3; ri++) {
      if (t.rounds[ri].groups.every(g => g.status === 'done')) {
        autoCollapsed.add(ri);
      } else {
        break; // 遇到未完成的轮次停止，后续轮次不折叠
      }
    }

    tournaments.push({
      rounds: t.rounds,
      flat,
      collapsed: autoCollapsed,
      areaEl: area,
      svgEl: svg,
    });

    render(tIdx);
}

// 首次渲染
initBrackets(DATA);

/* ══════════════════════════════════════════
   视图切换（当前赛事 / 历史赛事）
   ══════════════════════════════════════════ */
let currentView = 'active';

// 加载归档赛事列表到下拉条
async function loadArchivedTournaments() {
  try {
    const res = await fetch('/api/tournaments');
    const data = await res.json();
    const select = document.getElementById('bracket-switcher');
    // 清空旧的归档选项
    while (select.options.length > 1) select.remove(1);
    const archived = data.filter(t => t.status === 'archived');
    archived.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t.name;
      opt.textContent = t.name;
      select.appendChild(opt);
    });
    if (archived.length === 0) select.style.display = 'none';
  } catch (e) {
    console.error('loadArchivedTournaments error:', e);
  }
}
loadArchivedTournaments();

async function switchBracketView(view) {
  currentView = view;
  const container = document.getElementById('brackets-container');
  const emptyState = document.getElementById('empty-state');

  if (view === 'active') {
    // 回到当前赛事
    emptyState.style.display = 'none';
    container.style.display = '';
    if (bracketSse) { bracketSse.close(); bracketSse = null; }
    try {
      const res = await fetch('/api/bracket');
      const data = await res.json();
      if (!data.tournaments || data.tournaments.length === 0) {
        container.innerHTML = '';
      } else {
        initBrackets(data);
      }
      lastBracketHash = stableStringify(data);
      connectBracketSse();
    } catch (e) {
      console.error('switchBracketView active error:', e);
    }
  } else {
    // 加载指定的归档赛事
    if (bracketSse) { bracketSse.close(); bracketSse = null; }
    try {
      const res = await fetch(`/api/bracket/history/${encodeURIComponent(view)}`);
      const data = await res.json();
      if (!data.tournaments || data.tournaments.length === 0) {
        container.style.display = 'none';
        emptyState.style.display = '';
      } else {
        emptyState.style.display = 'none';
        container.style.display = '';
        initBrackets(data);
      }
    } catch (e) {
      console.error('switchBracketView archived error:', e);
    }
  }
}

/* ══════════════════════════════════════════
   SSE 实时更新（仅 active 视图）
   ══════════════════════════════════════════ */
let bracketSse = null;
let lastBracketHash = '';

// 与服务端 sort_keys=True 一致的确定性序列化
function stableStringify(obj) {
  return JSON.stringify(obj, function(key, value) {
    if (value && typeof value === 'object' && !Array.isArray(value)) {
      return Object.keys(value).sort().reduce(function(sorted, k) {
        sorted[k] = value[k];
        return sorted;
      }, {});
    }
    return value;
  });
}

function connectBracketSse() {
  if (bracketSse) bracketSse.close();
  bracketSse = new EventSource('/api/events/bracket');
  window.__sse_list && window.__sse_list.push(bracketSse);

  bracketSse.onmessage = function(e) {
    if (!e.data) return;
    if (currentView !== 'active') return;  // 历史视图不处理 SSE
    if (e.data !== lastBracketHash) {
      lastBracketHash = e.data;
      try {
        initBrackets(JSON.parse(e.data));
      } catch(err) { console.error('[bracket-sse] parse error:', err); }
    }
  };

  bracketSse.onerror = function() {
    bracketSse.close();
    // EventSource 自动重连
  };
}

// 首次连接：用与服务端一致的排序方式初始化指纹
lastBracketHash = stableStringify(DATA);
connectBracketSse();

// 切 tab 时断开/重连，省资源
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    if (bracketSse) { bracketSse.close(); bracketSse = null; }
  } else if (currentView === 'active') {
    lastBracketHash = '';
    connectBracketSse();
  }
});
</script>
