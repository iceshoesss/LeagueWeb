{% extends "base.html" %}
{% block title %}{{ title|default('页面不存在') }} — 酒馆战棋{% endblock %}

{% block content %}
<div class="max-w-md mx-auto text-center py-20">
    <div class="text-6xl mb-4">{{ emoji|default('👻') }}</div>
    <h1 class="text-2xl font-bold text-hearth-gold mb-2">{{ title|default('页面不存在') }}</h1>
    <p class="text-hearth-dim mb-8">{{ message|default('你迷路了，酒馆里没有这个地方') }}</p>
    <a href="/" class="inline-block px-6 py-3 rounded-lg font-bold text-sm bg-hearth-gold/20 text-hearth-gold hover:bg-hearth-gold/30 transition">
        🏠 回到酒馆
    </a>
</div>
{% endblock %}
