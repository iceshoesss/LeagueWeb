{% extends "base.html" %}

{% block title %}报名参赛 - {{ site_name }}{% endblock %}

{% block head %}
<style>
  main { max-width: none !important; padding: 0 !important; }

  /* ── 全屏 Hero ── */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 20%, rgba(226,183,20,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 80%, rgba(15,52,96,0.4) 0%, transparent 60%),
                #0d1117;
    overflow: hidden;
    padding: 60px 20px 80px;
  }

  /* 背景粒子层 */
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(226,183,20,0.3), transparent),
      radial-gradient(1px 1px at 30% 60%, rgba(226,183,20,0.2), transparent),
      radial-gradient(1px 1px at 50% 10%, rgba(226,183,20,0.4), transparent),
      radial-gradient(1px 1px at 70% 40%, rgba(226,183,20,0.15), transparent),
      radial-gradient(1px 1px at 90% 70%, rgba(226,183,20,0.25), transparent),
      radial-gradient(1.5px 1.5px at 15% 80%, rgba(226,183,20,0.2), transparent),
      radial-gradient(1px 1px at 85% 15%, rgba(226,183,20,0.3), transparent),
      radial-gradient(1.5px 1.5px at 45% 90%, rgba(226,183,20,0.15), transparent);
    animation: starfield 8s ease-in-out infinite alternate;
  }
  @keyframes starfield {
    0% { opacity: 0.5; transform: translateY(0); }
    100% { opacity: 1; transform: translateY(-10px); }
  }

  /* 标题 */
  .hero-title {
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 900;
    letter-spacing: 0.08em;
    background: linear-gradient(135deg, #ffd700 0%, #e2b714 40%, #c9a84c 60%, #ffd700 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: goldShimmer 4s ease-in-out infinite;
    text-shadow: 0 0 60px rgba(226,183,20,0.15);
    position: relative; z-index: 1;
    margin-bottom: 8px;
  }
  @keyframes goldShimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .hero-sub {
    font-size: clamp(0.9rem, 2vw, 1.15rem);
    color: #8b8b9e;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    position: relative; z-index: 1;
    margin-bottom: 48px;
  }

  /* ── 倒计时 ── */
  .countdown {
    display: flex; gap: 16px;
    position: relative; z-index: 1;
    margin-bottom: 48px;
  }
  .cd-unit {
    display: flex; flex-direction: column; align-items: center;
    min-width: 72px;
  }
  .cd-num {
    font-size: 2.8rem; font-weight: 900;
    color: #e2b714;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    text-shadow: 0 0 20px rgba(226,183,20,0.2);
  }
  .cd-label {
    font-size: 0.7rem; color: #8b8b9e;
    letter-spacing: 0.15em;
    margin-top: 4px;
    text-transform: uppercase;
  }
  .cd-sep {
    font-size: 2rem; color: #2a2a4a; font-weight: 300;
    line-height: 1; padding-top: 4px;
  }

  /* ── 环形进度 ── */
  .ring-wrap {
    position: relative; z-index: 1;
    width: 260px; height: 260px;
    margin-bottom: 36px;
  }
  .ring-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: #1a1a2e; stroke-width: 8; }
  .ring-fg {
    fill: none; stroke: url(#ringGrad); stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s ease;
    filter: drop-shadow(0 0 8px rgba(226,183,20,0.3));
  }
  .ring-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .ring-num {
    font-size: 3.5rem; font-weight: 900; color: #fff;
    line-height: 1;
  }
  .ring-cap {
    font-size: 0.85rem; color: #8b8b9e;
    margin-top: 2px;
  }
  .ring-label {
    font-size: 0.7rem; color: #e2b714; letter-spacing: 0.2em;
    margin-top: 8px; text-transform: uppercase;
  }

  /* ── 按钮 ── */
  .enroll-cta {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    margin-bottom: 16px;
  }
  .btn-enroll {
    padding: 16px 56px;
    font-size: 1.1rem; font-weight: 800;
    letter-spacing: 0.1em;
    color: #000;
    background: linear-gradient(135deg, #ffd700, #e2b714, #c9a84c);
    border: none; border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 24px rgba(226,183,20,0.25), inset 0 1px 0 rgba(255,255,255,0.2);
    text-transform: uppercase;
  }
  .btn-enroll:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(226,183,20,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
  }
  .btn-enroll:active { transform: translateY(0); }
  .btn-enroll:disabled {
    opacity: 0.5; cursor: not-allowed; transform: none;
    box-shadow: none;
  }

  .btn-withdraw {
    padding: 10px 32px;
    font-size: 0.8rem; font-weight: 600;
    color: #ef4444;
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-withdraw:hover {
    background: rgba(239,68,68,0.15);
    border-color: rgba(239,68,68,0.4);
  }

  .enroll-msg {
    font-size: 0.85rem;
    min-height: 20px;
    position: relative; z-index: 1;
  }
  .enroll-msg.ok { color: #34d399; }
  .enroll-msg.err { color: #ef4444; }

  /* 你的状态 badge */
  .status-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 20px;
    border-radius: 999px;
    font-weight: 700; font-size: 0.9rem;
    position: relative; z-index: 1;
    margin-bottom: 12px;
  }
  .status-badge.enrolled {
    background: rgba(52,211,153,0.1);
    border: 1px solid rgba(52,211,153,0.3);
    color: #34d399;
  }
  .status-badge.waitlist {
    background: rgba(226,183,20,0.1);
    border: 1px solid rgba(226,183,20,0.3);
    color: #e2b714;
  }

  /* ── 报名列表 ── */
  .list-section {
    max-width: 800px; width: 100%;
    margin: 0 auto;
    padding: 0 20px 80px;
    position: relative; z-index: 1;
  }
  .list-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .list-title {
    font-size: 1.1rem; font-weight: 700; color: #e2b714;
    letter-spacing: 0.05em;
  }
  .list-stats {
    font-size: 0.8rem; color: #8b8b9e;
  }
  .list-stats b { color: #e2b714; }

  .enroll-list {
    background: rgba(22,33,62,0.6);
    border: 1px solid rgba(42,42,74,0.5);
    border-radius: 12px;
    overflow: hidden;
    backdrop-filter: blur(8px);
  }
  .el-row {
    display: flex; align-items: center;
    padding: 10px 16px;
    border-bottom: 1px solid rgba(42,42,74,0.3);
    transition: background 0.15s;
  }
  .el-row:last-child { border-bottom: none; }
  .el-row:hover { background: rgba(226,183,20,0.03); }
  .el-pos {
    width: 44px; font-weight: 800; font-size: 0.75rem;
    color: #8b8b9e; text-align: center; flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }
  .el-pos.top { color: #e2b714; }
  .el-name {
    flex: 1; font-size: 0.9rem; color: #d1d5db;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .el-name.wl { color: #8b8b9e; font-style: italic; }
  .el-tag {
    font-size: 0.65rem; font-weight: 800; padding: 2px 8px;
    border-radius: 4px; margin-left: 10px; flex-shrink: 0;
    letter-spacing: 0.05em;
  }
  .el-tag.enrolled { background: rgba(52,211,153,0.12); color: #34d399; }
  .el-tag.waitlist { background: rgba(226,183,20,0.08); color: #c9a84c; }
  .el-time {
    font-size: 0.75rem; color: #8b8b9e; margin-left: 12px; flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  .empty-state {
    text-align: center; padding: 48px 20px; color: #8b8b9e;
  }
  .empty-state .icon { font-size: 2rem; margin-bottom: 8px; opacity: 0.4; }

  /* ── 底部分隔线光效 ── */
  .divider-glow {
    width: 200px; height: 1px; margin: 0 auto 48px;
    background: linear-gradient(90deg, transparent, rgba(226,183,20,0.4), transparent);
  }

  /* ── 滚动指示 ── */
  .scroll-hint {
    position: absolute; bottom: 24px; left: 50%;
    transform: translateX(-50%);
    color: #8b8b9e; font-size: 0.75rem;
    letter-spacing: 0.15em;
    animation: scrollBounce 2s ease-in-out infinite;
  }
  @keyframes scrollBounce {
    0%, 100% { opacity: 0.4; transform: translateX(-50%) translateY(0); }
    50% { opacity: 0.8; transform: translateX(-50%) translateY(6px); }
  }

  @media (max-width: 640px) {
    .countdown { gap: 10px; }
    .cd-unit { min-width: 56px; }
    .cd-num { font-size: 2rem; }
    .ring-wrap { width: 200px; height: 200px; }
    .ring-num { font-size: 2.5rem; }
    .btn-enroll { padding: 14px 40px; font-size: 1rem; }
  }
</style>
{% endblock %}

{% block content %}
<!-- ════════ Hero ════════ -->
<section class="hero">
  <h1 class="hero-title">酒馆战棋联赛</h1>
  <p class="hero-sub">Hearthstone Battlegrounds League</p>

  <!-- 倒计时 -->
  <div id="countdown" class="countdown hidden">
    <div class="cd-unit"><span id="cdD" class="cd-num">0</span><span class="cd-label">天</span></div>
    <span class="cd-sep">:</span>
    <div class="cd-unit"><span id="cdH" class="cd-num">00</span><span class="cd-label">时</span></div>
    <span class="cd-sep">:</span>
    <div class="cd-unit"><span id="cdM" class="cd-num">00</span><span class="cd-label">分</span></div>
    <span class="cd-sep">:</span>
    <div class="cd-unit"><span id="cdS" class="cd-num">00</span><span class="cd-label">秒</span></div>
  </div>

  <!-- 环形进度 -->
  <div class="ring-wrap">
    <svg class="ring-svg" viewBox="0 0 260 260">
      <defs>
        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ffd700"/>
          <stop offset="50%" stop-color="#e2b714"/>
          <stop offset="100%" stop-color="#c9a84c"/>
        </linearGradient>
      </defs>
      <circle class="ring-bg" cx="130" cy="130" r="118"/>
      <circle id="ringFg" class="ring-fg" cx="130" cy="130" r="118"
              stroke-dasharray="741.4" stroke-dashoffset="741.4"/>
    </svg>
    <div class="ring-center">
      <span id="ringNum" class="ring-num">0</span>
      <span class="ring-cap">/ 1024</span>
      <span class="ring-label">正选名额</span>
    </div>
  </div>

  <div class="divider-glow"></div>

  <!-- 状态 -->
  <div id="yourBadge" class="hidden"></div>

  <!-- 操作 -->
  <div class="enroll-cta">
    <button id="enrollBtn" onclick="doEnroll()" class="btn-enroll">⚔️ 报名参赛</button>
    <button id="withdrawBtn" onclick="doWithdraw()" class="btn-withdraw hidden">取消报名</button>
  </div>
  <div id="enrollMsg" class="enroll-msg"></div>

  <div class="scroll-hint">▼ 向下查看报名列表</div>
</section>

<!-- ════════ 报名列表 ════════ -->
<section class="list-section">
  <div class="list-header">
    <span class="list-title">⚔️ 报名名单</span>
    <span class="list-stats">正选 <b id="lsEnrolled">0</b> · 替补 <b id="lsWaitlist">0</b></span>
  </div>
  <div id="enrollList" class="enroll-list">
    <div class="empty-state"><div class="icon">⚔️</div>暂无报名</div>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
const RING_CIRCUMFERENCE = 2 * Math.PI * 118; // ~741.4
let deadlineTs = null;
let cdTimer = null;

/* ── 倒计时 ── */
function startCountdown(dl) {
  deadlineTs = new Date(dl).getTime();
  const el = document.getElementById('countdown');
  el.classList.remove('hidden');
  if (cdTimer) clearInterval(cdTimer);
  cdTimer = setInterval(tickCountdown, 1000);
  tickCountdown();
}

function tickCountdown() {
  const now = Date.now();
  let diff = Math.max(0, deadlineTs - now);
  const d = Math.floor(diff / 86400000); diff %= 86400000;
  const h = Math.floor(diff / 3600000);  diff %= 3600000;
  const m = Math.floor(diff / 60000);    diff %= 60000;
  const s = Math.floor(diff / 1000);

  document.getElementById('cdD').textContent = d;
  document.getElementById('cdH').textContent = String(h).padStart(2, '0');
  document.getElementById('cdM').textContent = String(m).padStart(2, '0');
  document.getElementById('cdS').textContent = String(s).padStart(2, '0');

  if (d + h + m + s === 0) {
    clearInterval(cdTimer);
    document.getElementById('countdown').innerHTML =
      '<span style="color:#ef4444;font-weight:800;font-size:1.2rem;letter-spacing:0.1em">报名已截止</span>';
  }
}

/* ── 环形进度 ── */
function setRingProgress(count) {
  const pct = Math.min(1, count / 1024);
  const offset = RING_CIRCUMFERENCE * (1 - pct);
  document.getElementById('ringFg').style.strokeDashoffset = offset;
  document.getElementById('ringNum').textContent = count;

  // 快满时变红
  if (pct >= 0.95) {
    document.getElementById('ringFg').style.stroke = '#ef4444';
  }
}

/* ── 加载状态 ── */
async function loadStatus() {
  try {
    const r = await fetch('/api/enroll/status');
    const d = await r.json();

    setRingProgress(d.enrolledCount || 0);

    // 倒计时
    if (d.deadline) {
      const dl = new Date(d.deadline);
      if (new Date() < dl) {
        startCountdown(d.deadline);
      } else {
        document.getElementById('countdown').classList.remove('hidden');
        document.getElementById('countdown').innerHTML =
          '<span style="color:#ef4444;font-weight:800;font-size:1.2rem;letter-spacing:0.1em">报名已截止</span>';
      }
    }

    // 按钮 + 状态
    const badge = document.getElementById('yourBadge');
    const enrollBtn = document.getElementById('enrollBtn');
    const withdrawBtn = document.getElementById('withdrawBtn');

    if (d.enrolled) {
      badge.classList.remove('hidden');
      if (d.status === 'enrolled') {
        badge.className = 'status-badge enrolled';
        badge.innerHTML = '✅ 你已报名 · 正选 #' + d.position;
      } else {
        badge.className = 'status-badge waitlist';
        badge.innerHTML = '⏳ 你已报名 · 替补 #' + d.position;
      }
      enrollBtn.classList.add('hidden');
      withdrawBtn.classList.remove('hidden');
    } else {
      badge.classList.add('hidden');
      enrollBtn.classList.remove('hidden');
      withdrawBtn.classList.add('hidden');
    }
  } catch(e) { console.error('loadStatus:', e); }
}

/* ── 加载列表 ── */
async function loadList() {
  try {
    const r = await fetch('/api/enrollments');
    const d = await r.json();

    document.getElementById('lsEnrolled').textContent = d.enrolledCount || 0;
    document.getElementById('lsWaitlist').textContent = d.waitlistCount || 0;

    const c = document.getElementById('enrollList');
    if (!d.players || d.players.length === 0) {
      c.innerHTML = '<div class="empty-state"><div class="icon">⚔️</div>暂无报名</div>';
      return;
    }

    let html = '';
    let inWaitlist = false;
    d.players.forEach(p => {
      const isWL = p.status === 'waitlist';
      if (isWL && !inWaitlist) {
        inWaitlist = true;
        html += '<div style="padding:8px 16px;background:rgba(226,183,20,0.04);border-bottom:1px solid rgba(42,42,74,0.4);font-size:0.7rem;color:#c9a84c;letter-spacing:0.15em;font-weight:700">替 补 队 列</div>';
      }
      const posCls = p.position <= 3 ? 'top' : '';
      html += `<div class="el-row">
        <span class="el-pos ${posCls}">${p.position}</span>
        <span class="el-name ${isWL ? 'wl' : ''}">${esc(p.displayName)}</span>
        <span class="el-tag ${p.status}">${isWL ? '替补' : '正选'}</span>
        <span class="el-time">${fmtTime(p.enrollAt)}</span>
      </div>`;
    });
    c.innerHTML = html;
  } catch(e) {
    console.error('loadList:', e);
    document.getElementById('enrollList').innerHTML = '<div class="empty-state" style="color:#ef4444">加载失败</div>';
  }
}

/* ── 报名 / 退赛 ── */
async function doEnroll() {
  const btn = document.getElementById('enrollBtn');
  btn.disabled = true; btn.textContent = '报名中...';
  try {
    const r = await fetch('/api/enroll', { method: 'POST' });
    const d = await r.json();
    showMsg(d.message || d.error, r.ok);
    if (r.ok) { loadStatus(); loadList(); }
  } catch(e) { showMsg('网络错误', false); }
  btn.disabled = false; btn.textContent = '⚔️ 报名参赛';
}

async function doWithdraw() {
  if (!confirm('确定要取消报名吗？')) return;
  const btn = document.getElementById('withdrawBtn');
  btn.disabled = true; btn.textContent = '取消中...';
  try {
    const r = await fetch('/api/enroll/withdraw', { method: 'POST' });
    const d = await r.json();
    showMsg(d.message || d.error, r.ok);
    if (r.ok) { loadStatus(); loadList(); }
  } catch(e) { showMsg('网络错误', false); }
  btn.disabled = false; btn.textContent = '取消报名';
}

function showMsg(msg, ok) {
  const el = document.getElementById('enrollMsg');
  el.textContent = msg;
  el.className = 'enroll-msg ' + (ok ? 'ok' : 'err');
  setTimeout(() => { el.textContent = ''; el.className = 'enroll-msg'; }, 5000);
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtTime(s) {
  if (!s) return '';
  try { return new Date(s).toLocaleString('zh-CN', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
  catch { return s; }
}

loadStatus();
loadList();
</script>
{% endblock %}
