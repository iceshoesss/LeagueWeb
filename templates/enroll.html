{% extends "base.html" %}

{% block title %}大安战棋邀请赛{% endblock %}

{% block head %}
<style>
  main { max-width: none !important; padding: 0 !important; }

  .enroll-page {
    background: #07080c;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  /* ════════ Hero ════════ */
  .hero {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center;
    padding: 100px 20px 80px;
    text-align: center;
  }

  /* 棋盘纹理底 */
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 50% 50%, rgba(226,183,20,0.04) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(226,183,20,0.02) 59px, rgba(226,183,20,0.02) 60px),
      repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(226,183,20,0.02) 59px, rgba(226,183,20,0.02) 60px);
    pointer-events: none;
  }

  /* 星尘 */
  .hero::after {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 25%, rgba(226,183,20,0.35), transparent),
      radial-gradient(1px 1px at 45% 15%, rgba(226,183,20,0.2), transparent),
      radial-gradient(1.5px 1.5px at 75% 35%, rgba(226,183,20,0.3), transparent),
      radial-gradient(1px 1px at 25% 75%, rgba(226,183,20,0.15), transparent),
      radial-gradient(1px 1px at 85% 65%, rgba(226,183,20,0.25), transparent),
      radial-gradient(1.5px 1.5px at 55% 85%, rgba(226,183,20,0.2), transparent);
    animation: drift 10s ease-in-out infinite alternate;
    pointer-events: none;
  }
  @keyframes drift { 0% { opacity: 0.5; } 100% { opacity: 1; } }

  .hero-eyebrow {
    font-size: 0.7rem; color: #4b5563;
    letter-spacing: 0.6em; text-transform: uppercase;
    margin-bottom: 24px;
    position: relative; z-index: 1;
  }

  /* 落子皆传说 — 核心 */
  .hero-slogan {
    font-size: clamp(1.8rem, 5vw, 3.2rem);
    font-weight: 900; line-height: 1.2;
    color: #fff;
    position: relative; z-index: 1;
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }
  .hero-slogan em {
    font-style: normal;
    background: linear-gradient(135deg, #ffd700, #e2b714);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  .hero-title {
    font-size: clamp(3.5rem, 9vw, 6rem);
    font-weight: 900; line-height: 1;
    background: linear-gradient(180deg, #ffd700 0%, #e2b714 35%, #a07818 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    filter: drop-shadow(0 0 50px rgba(226,183,20,0.12));
    position: relative; z-index: 1;
    margin-bottom: 16px;
  }

  .hero-line {
    width: 80px; height: 1px; margin: 0 auto 16px;
    background: linear-gradient(90deg, transparent, rgba(226,183,20,0.4), transparent);
    position: relative; z-index: 1;
  }

  .hero-sub {
    font-size: 0.8rem; color: #6b7280;
    letter-spacing: 0.4em;
    position: relative; z-index: 1;
    margin-bottom: 56px;
  }

  /* ════════ 倒计时 ════════ */
  .countdown {
    display: flex; gap: 20px;
    position: relative; z-index: 1;
    margin-bottom: 48px;
  }
  .cd-unit { display: flex; flex-direction: column; align-items: center; min-width: 60px; }
  .cd-num {
    font-size: 2.4rem; font-weight: 900; color: #e2b714;
    font-variant-numeric: tabular-nums; line-height: 1;
  }
  .cd-label { font-size: 0.6rem; color: #4b5563; letter-spacing: 0.25em; margin-top: 4px; }
  .cd-sep { font-size: 1.6rem; color: #1f2937; line-height: 1; padding-top: 2px; }

  /* ════════ 落子按钮 ════════ */
  .cta {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    margin-bottom: 12px;
  }

  .btn-enroll {
    position: relative;
    padding: 18px 64px; font-size: 1.05rem; font-weight: 900;
    letter-spacing: 0.2em; color: #000;
    background: linear-gradient(135deg, #ffd700, #e2b714, #c9a84c);
    border: none; border-radius: 4px; cursor: pointer;
    box-shadow: 0 0 0 1px rgba(226,183,20,0.3), 0 4px 24px rgba(226,183,20,0.15);
    transition: all 0.3s;
    overflow: hidden;
  }
  .btn-enroll::before {
    content: '';
    position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
    background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.15) 50%, transparent 60%);
    transform: translateX(-100%);
    transition: transform 0.6s;
  }
  .btn-enroll:hover::before { transform: translateX(100%); }
  .btn-enroll:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 0 1px rgba(226,183,20,0.5), 0 8px 32px rgba(226,183,20,0.25);
  }
  .btn-enroll:active { transform: translateY(0); }
  .btn-enroll:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-enroll:disabled::before { display: none; }

  .btn-withdraw {
    padding: 8px 24px; font-size: 0.7rem; font-weight: 600;
    color: #4b5563; background: transparent;
    border: 1px solid #1f2937; border-radius: 3px; cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.05em;
  }
  .btn-withdraw:hover { color: #ef4444; border-color: rgba(239,68,68,0.25); }

  .enroll-msg { font-size: 0.8rem; min-height: 18px; position: relative; z-index: 1; }
  .enroll-msg.ok { color: #34d399; } .enroll-msg.err { color: #ef4444; }

  .status-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 20px; border-radius: 999px;
    font-weight: 700; font-size: 0.85rem;
    position: relative; z-index: 1; margin-bottom: 12px;
  }
  .status-badge.enrolled { background: rgba(52,211,153,0.06); border: 1px solid rgba(52,211,153,0.15); color: #34d399; }
  .status-badge.waitlist { background: rgba(226,183,20,0.06); border: 1px solid rgba(226,183,20,0.15); color: #e2b714; }

  /* ════════ 棋盘碑林 ════════ */
  .board {
    position: relative; z-index: 1;
    max-width: 1000px; margin: 0 auto;
    padding: 0 20px 120px;
  }

  .board-header {
    display: flex; align-items: baseline; gap: 16px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid #111827;
  }
  .board-title {
    font-size: 1rem; font-weight: 800; color: #e2b714;
    letter-spacing: 0.15em;
  }
  .board-count {
    font-size: 0.75rem; color: #4b5563;
  }
  .board-count b { color: #9ca3af; }

  /* 网格 */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 2px;
  }

  /* 每个棋子 / 碑 */
  .cell {
    position: relative;
    background: #0d1117;
    border: 1px solid #111827;
    padding: 20px 8px 14px;
    text-align: center;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: default;
  }

  /* 序号 */
  .cell-rank {
    font-size: 0.55rem; font-weight: 800; color: #1f2937;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
    transition: color 0.3s;
  }

  /* 名字 */
  .cell-name {
    font-size: 0.8rem; font-weight: 700; color: #6b7280;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    line-height: 1.2;
    transition: color 0.3s;
  }

  /* 时间 */
  .cell-time {
    font-size: 0.55rem; color: #1f2937; margin-top: 8px;
    font-variant-numeric: tabular-nums;
    transition: color 0.3s;
  }

  /* ── hover: 点亮碑文 ── */
  .cell:hover {
    border-color: #1f2937;
    background: #111827;
  }
  .cell:hover .cell-rank { color: #4b5563; }
  .cell:hover .cell-name { color: #d1d5db; }
  .cell:hover .cell-time { color: #374151; }

  /* ── 第一名: 传说金碑 ── */
  .cell.legendary {
    background: linear-gradient(180deg, #1a1508, #0d1117);
    border-color: rgba(226,183,20,0.3);
  }
  .cell.legendary::after {
    content: '';
    position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
    background: linear-gradient(90deg, transparent, #e2b714, transparent);
  }
  .cell.legendary .cell-rank { color: rgba(226,183,20,0.6); }
  .cell.legendary .cell-name { color: #ffd700; font-weight: 900; }
  .cell.legendary .cell-time { color: rgba(226,183,20,0.3); }
  .cell.legendary:hover { box-shadow: 0 0 30px rgba(226,183,20,0.06); }

  /* ── 第二名 ── */
  .cell.epic {
    background: linear-gradient(180deg, #10121a, #0d1117);
    border-color: rgba(139,92,246,0.2);
  }
  .cell.epic .cell-name { color: #a78bfa; }
  .cell.epic .cell-rank { color: rgba(139,92,246,0.4); }

  /* ── 第三名 ── */
  .cell.rare {
    background: linear-gradient(180deg, #0f1520, #0d1117);
    border-color: rgba(59,130,246,0.15);
  }
  .cell.rare .cell-name { color: #60a5fa; }
  .cell.rare .cell-rank { color: rgba(59,130,246,0.35); }

  /* ── 正选 ── */
  .cell.common .cell-name { color: #9ca3af; }

  /* ── 替补分隔 ── */
  .grid-divider {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 16px;
    padding: 20px 0 10px;
  }
  .grid-divider::before, .grid-divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, #111827, transparent);
  }
  .grid-divider span {
    font-size: 0.6rem; color: #374151;
    letter-spacing: 0.4em; font-weight: 800;
  }

  /* ── 替补 ── */
  .cell.waitlist .cell-name { color: #4b5563; font-style: italic; }
  .cell.waitlist .cell-rank { color: #1f2937; }
  .cell.waitlist .cell-time { color: #1f2937; }
  .cell.waitlist:hover .cell-name { color: #6b7280; }

  /* 空 */
  .grid-empty {
    grid-column: 1 / -1;
    text-align: center; padding: 80px 20px;
  }
  .grid-empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.08; }
  .grid-empty-text { font-size: 0.8rem; color: #374151; letter-spacing: 0.15em; }

  /* 底部渐隐 */
  .board::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
    background: linear-gradient(transparent, #07080c);
    pointer-events: none;
  }

  @media (max-width: 640px) {
    .hero { padding: 80px 16px 60px; }
    .hero-slogan { font-size: 1.5rem; }
    .hero-title { font-size: 3rem; }
    .countdown { gap: 12px; }
    .cd-num { font-size: 1.8rem; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
    .cell { padding: 16px 6px 10px; }
    .btn-enroll { padding: 16px 44px; font-size: 0.95rem; }
  }
</style>
{% endblock %}

{% block content %}
<div class="enroll-page">

  <!-- ════════ Hero ════════ -->
  <section class="hero">
    <div class="hero-eyebrow">Hearthstone Battlegrounds Invitational</div>
    <div class="hero-slogan">落 子 皆 <em>传 说</em></div>
    <h1 class="hero-title">大安战棋邀请赛</h1>
    <div class="hero-line"></div>
    <p class="hero-sub">每 一 步 落 子 ， 都 将 被 铭 记</p>

    <!-- 倒计时 -->
    <div id="countdown" class="countdown hidden">
      <div class="cd-unit"><span id="cdD" class="cd-num">0</span><span class="cd-label">天</span></div>
      <span class="cd-sep">:</span>
      <div class="cd-unit"><span id="cdH" class="cd-num">00</span><span class="cd-label">时</span></div>
      <span class="cd-sep">:</span>
      <div class="cd-unit"><span id="cdM" class="cd-num">00</span><span class="cd-label">分</span></div>
      <span class="cd-sep">:</span>
      <div class="cd-unit"><span id="cdS" class="cd-num">00</span><span class="cd-label">秒</span></div>
    </div>

    <!-- 状态 -->
    <div id="yourBadge" class="hidden"></div>

    <!-- 操作 -->
    <div class="cta">
      <button id="enrollBtn" onclick="doEnroll()" class="btn-enroll">落 子</button>
      <button id="withdrawBtn" onclick="doWithdraw()" class="btn-withdraw hidden">悔棋</button>
    </div>
    <div id="enrollMsg" class="enroll-msg"></div>
  </section>

  <!-- ════════ 棋盘碑林 ════════ -->
  <section class="board">
    <div class="board-header">
      <span class="board-title">棋 盘</span>
      <span class="board-count"><b id="lsEnrolled">0</b> 子已落 · <b id="lsWaitlist">0</b> 待入局</span>
    </div>
    <div id="grid" class="grid">
      <div class="grid-empty">
        <div class="grid-empty-icon">♟</div>
        <div class="grid-empty-text">棋盘尚空，等待落子</div>
      </div>
    </div>
  </section>

</div>
{% endblock %}

{% block scripts %}
<script>
let deadlineTs = null, cdTimer = null;

/* ── 倒计时 ── */
function startCountdown(dl) {
  deadlineTs = new Date(dl).getTime();
  document.getElementById('countdown').classList.remove('hidden');
  if (cdTimer) clearInterval(cdTimer);
  cdTimer = setInterval(tick, 1000);
  tick();
}
function tick() {
  let d = Math.max(0, deadlineTs - Date.now());
  const dd = Math.floor(d / 864e5); d %= 864e5;
  const hh = Math.floor(d / 36e5);  d %= 36e5;
  const mm = Math.floor(d / 6e4);   d %= 6e4;
  const ss = Math.floor(d / 1e3);
  document.getElementById('cdD').textContent = dd;
  document.getElementById('cdH').textContent = String(hh).padStart(2, '0');
  document.getElementById('cdM').textContent = String(mm).padStart(2, '0');
  document.getElementById('cdS').textContent = String(ss).padStart(2, '0');
  if (dd + hh + mm + ss === 0) {
    clearInterval(cdTimer);
    document.getElementById('countdown').innerHTML =
      '<span style="color:#ef4444;font-weight:800;font-size:0.9rem;letter-spacing:0.15em">报名已截止</span>';
  }
}

/* ── 状态 ── */
async function loadStatus() {
  try {
    const r = await fetch('/api/enroll/status');
    const d = await r.json();

    if (d.deadline) {
      if (new Date() < new Date(d.deadline)) startCountdown(d.deadline);
      else {
        document.getElementById('countdown').classList.remove('hidden');
        document.getElementById('countdown').innerHTML =
          '<span style="color:#ef4444;font-weight:800;font-size:0.9rem;letter-spacing:0.15em">报名已截止</span>';
      }
    }

    const badge = document.getElementById('yourBadge');
    const eb = document.getElementById('enrollBtn');
    const wb = document.getElementById('withdrawBtn');
    if (d.enrolled) {
      badge.classList.remove('hidden');
      if (d.status === 'enrolled') {
        badge.className = 'status-badge enrolled';
        badge.innerHTML = '♟ 已落子 · #' + d.position;
      } else {
        badge.className = 'status-badge waitlist';
        badge.innerHTML = '⏳ 待入局 · #' + d.position;
      }
      eb.classList.add('hidden'); wb.classList.remove('hidden');
    } else {
      badge.classList.add('hidden');
      eb.classList.remove('hidden'); wb.classList.add('hidden');
    }
  } catch(e) { console.error(e); }
}

/* ── 棋盘 ── */
async function loadList() {
  try {
    const r = await fetch('/api/enrollments');
    const d = await r.json();
    document.getElementById('lsEnrolled').textContent = d.enrolledCount || 0;
    document.getElementById('lsWaitlist').textContent = d.waitlistCount || 0;

    const grid = document.getElementById('grid');
    if (!d.players || d.players.length === 0) {
      grid.innerHTML = '<div class="grid-empty"><div class="grid-empty-icon">♟</div><div class="grid-empty-text">棋盘尚空，等待落子</div></div>';
      return;
    }

    let html = '';
    let wlShown = false;
    d.players.forEach(p => {
      const isWL = p.status === 'waitlist';
      if (isWL && !wlShown) {
        wlShown = true;
        html += '<div class="grid-divider"><span>待 入 局</span></div>';
      }
      let cls = 'cell';
      if (isWL) {
        cls += ' waitlist';
      } else if (p.position === 1) {
        cls += ' legendary';
      } else if (p.position === 2) {
        cls += ' epic';
      } else if (p.position === 3) {
        cls += ' rare';
      } else {
        cls += ' common';
      }
      html += `<div class="${cls}">
        <div class="cell-rank">${isWL ? '待 #' + p.position : '#' + p.position}</div>
        <div class="cell-name" title="${esc(p.displayName)}">${esc(p.displayName)}</div>
        <div class="cell-time">${fmtTime(p.enrollAt)}</div>
      </div>`;
    });
    grid.innerHTML = html;
  } catch(e) {
    console.error(e);
    document.getElementById('grid').innerHTML = '<div class="grid-empty"><div class="grid-empty-text" style="color:#ef4444">加载失败</div></div>';
  }
}

/* ── 操作 ── */
async function doEnroll() {
  const btn = document.getElementById('enrollBtn');
  btn.disabled = true; btn.textContent = '落子中...';
  try {
    const r = await fetch('/api/enroll', { method: 'POST' });
    const d = await r.json();
    showMsg(d.message || d.error, r.ok);
    if (r.ok) { loadStatus(); loadList(); }
  } catch(e) { showMsg('网络错误', false); }
  btn.disabled = false; btn.textContent = '落 子';
}
async function doWithdraw() {
  if (!confirm('确定要悔棋吗？')) return;
  const btn = document.getElementById('withdrawBtn');
  btn.disabled = true; btn.textContent = '悔棋中...';
  try {
    const r = await fetch('/api/enroll/withdraw', { method: 'POST' });
    const d = await r.json();
    showMsg(d.message || d.error, r.ok);
    if (r.ok) { loadStatus(); loadList(); }
  } catch(e) { showMsg('网络错误', false); }
  btn.disabled = false; btn.textContent = '悔棋';
}
function showMsg(m, ok) {
  const el = document.getElementById('enrollMsg');
  el.textContent = m; el.className = 'enroll-msg ' + (ok ? 'ok' : 'err');
  setTimeout(() => { el.textContent = ''; el.className = 'enroll-msg'; }, 5000);
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtTime(s) {
  if (!s) return '';
  try { return new Date(s).toLocaleString('zh-CN', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
  catch { return s; }
}

loadStatus(); loadList();
</script>
{% endblock %}
