<svg xmlns="http://www.w3.org/2000/svg" width="600" height="780" viewBox="0 0 600 780">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>

  <rect width="600" height="780" rx="12" fill="url(#bg)"/>
  <rect x="1" y="1" width="598" height="778" rx="12" fill="none" stroke="#e2b714" stroke-opacity="0.3" stroke-width="1"/>

  <!-- 标题 -->
  <text x="300" y="48" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#e2b714">大安仙居杨梅杯 · 报名指南</text>
  <line x1="150" y1="62" x2="450" y2="62" stroke="#e2b714" stroke-opacity="0.3" stroke-width="1"/>

  <!-- 第一步 -->
  <text x="40" y="100" font-family="sans-serif" font-size="17" font-weight="bold" fill="#e2b714">第一步  下载工具（二选一）</text>

  <rect x="40" y="115" width="245" height="68" rx="6" fill="#000" fill-opacity="0.3" stroke="#2a2a4a" stroke-width="1"/>
  <text x="56" y="139" font-family="sans-serif" font-size="14" font-weight="bold" fill="#e2b714">bg_tool（推荐）</text>
  <text x="56" y="158" font-family="sans-serif" font-size="11" fill="#8b8b9e">独立桌面工具，不需要 HDT</text>
  <text x="56" y="175" font-family="sans-serif" font-size="10" fill="#e2b714">下载: A  提取码: B</text>

  <rect x="315" y="115" width="245" height="68" rx="6" fill="#000" fill-opacity="0.3" stroke="#2a2a4a" stroke-width="1"/>
  <text x="331" y="139" font-family="sans-serif" font-size="14" font-weight="bold" fill="#e2b714">HDT 插件</text>
  <text x="331" y="158" font-family="sans-serif" font-size="11" fill="#8b8b9e">已有 HDT 的用户专用</text>
  <text x="331" y="175" font-family="sans-serif" font-size="10" fill="#e2b714">下载: C  提取码: D</text>

  <!-- 第二步 -->
  <text x="40" y="210" font-family="sans-serif" font-size="17" font-weight="bold" fill="#e2b714">第二步  获取验证码</text>

  <circle cx="56" cy="238" r="12" fill="#e2b714" fill-opacity="0.15" stroke="#e2b714" stroke-width="1"/>
  <text x="56" y="243" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e2b714">1</text>
  <text x="76" y="243" font-family="sans-serif" font-size="13" fill="#d1d5db">启动炉石传说，进入主界面</text>

  <circle cx="56" cy="268" r="12" fill="#e2b714" fill-opacity="0.15" stroke="#e2b714" stroke-width="1"/>
  <text x="56" y="273" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e2b714">2</text>
  <text x="76" y="273" font-family="sans-serif" font-size="13" fill="#d1d5db">打开 bg_tool（或 HDT 插件）</text>

  <circle cx="56" cy="298" r="12" fill="#e2b714" fill-opacity="0.15" stroke="#e2b714" stroke-width="1"/>
  <text x="56" y="303" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e2b714">3</text>
  <text x="76" y="303" font-family="sans-serif" font-size="13" fill="#d1d5db">界面上直接显示验证码，点击复制</text>

  <rect x="40" y="318" width="520" height="28" rx="5" fill="#e2b714" fill-opacity="0.06"/>
  <text x="56" y="337" font-family="sans-serif" font-size="11" fill="#8b8b9e">不需要打一局游戏，进入主界面即可自动获取验证码</text>

  <!-- 第三步 -->
  <text x="40" y="382" font-family="sans-serif" font-size="17" font-weight="bold" fill="#e2b714">第三步  网站注册 + 报名</text>

  <circle cx="56" cy="410" r="12" fill="#e2b714" fill-opacity="0.15" stroke="#e2b714" stroke-width="1"/>
  <text x="56" y="415" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e2b714">1</text>
  <text x="76" y="415" font-family="sans-serif" font-size="13" fill="#d1d5db">打开联赛网站，点击「登录」</text>

  <circle cx="56" cy="440" r="12" fill="#e2b714" fill-opacity="0.15" stroke="#e2b714" stroke-width="1"/>
  <text x="56" y="445" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e2b714">2</text>
  <text x="76" y="445" font-family="sans-serif" font-size="13" fill="#d1d5db">输入 BattleTag（含 #tag）+ 验证码，登录</text>

  <circle cx="56" cy="470" r="12" fill="#e2b714" fill-opacity="0.15" stroke="#e2b714" stroke-width="1"/>
  <text x="56" y="475" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e2b714">3</text>
  <text x="76" y="475" font-family="sans-serif" font-size="13" fill="#d1d5db">点击「报名参赛」，完成报名</text>

  <!-- 注意事项 -->
  <rect x="40" y="510" width="520" height="200" rx="8" fill="#000" fill-opacity="0.25" stroke="#2a2a4a" stroke-width="1"/>
  <text x="56" y="536" font-family="sans-serif" font-size="14" font-weight="bold" fill="#e2b714">注意事项</text>

  <circle cx="60" cy="560" r="2.5" fill="#8b8b9e"/>
  <text x="70" y="564" font-family="sans-serif" font-size="12" fill="#d1d5db">提示「读取失败」时，右键以管理员身份运行即可</text>

  <circle cx="60" cy="588" r="2.5" fill="#8b8b9e"/>
  <text x="70" y="592" font-family="sans-serif" font-size="12" fill="#d1d5db">进入主界面即可获取验证码，不需要先打一局</text>

  <circle cx="60" cy="616" r="2.5" fill="#8b8b9e"/>
  <text x="70" y="620" font-family="sans-serif" font-size="12" fill="#d1d5db">报名后保持 QQ 群在线，出问题会 @ 你</text>

  <circle cx="60" cy="644" r="2.5" fill="#8b8b9e"/>
  <text x="70" y="648" font-family="sans-serif" font-size="12" fill="#d1d5db">比赛时正常开一局战棋，工具自动匹配并上传排名</text>

  <circle cx="60" cy="672" r="2.5" fill="#8b8b9e"/>
  <text x="70" y="676" font-family="sans-serif" font-size="12" fill="#d1d5db">有问题在群里问，或查看网站使用指南</text>

  <!-- 底部 -->
  <line x1="150" y1="730" x2="450" y2="730" stroke="#e2b714" stroke-opacity="0.2" stroke-width="1"/>
  <text x="300" y="758" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b8b9e" fill-opacity="0.4">大安仙居杨梅杯</text>
</svg>
